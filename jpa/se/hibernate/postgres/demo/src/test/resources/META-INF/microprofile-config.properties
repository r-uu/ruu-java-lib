# ============================================================================
# MicroProfile Config for JPA Hibernate PostgreSQL Demo Tests
# ============================================================================
# Properties are injected by Maven resource filtering from config.properties
# Maven replaces ${db.xxx} with actual values during build
# Fallback values (after colon) are used if Maven filtering doesn't work
# See: config.properties (machine-specific, git-ignored)
# ============================================================================

config_ordinal=100

# For DisabledOnServerNotListening - Database connection check
# lib_test runs in shared PostgreSQL container on port 5432
database.host=localhost
database.port=5432

# For AbstractEntityManagerProducer (module-specific keys) - uses lib_test database
de.ruu.lib.jpa.se.hibernate.postgres.AbstractEntityManagerProducer.host=localhost
de.ruu.lib.jpa.se.hibernate.postgres.AbstractEntityManagerProducer.port=5432
de.ruu.lib.jpa.se.hibernate.postgres.AbstractEntityManagerProducer.database=lib_test
de.ruu.lib.jpa.se.hibernate.postgres.AbstractEntityManagerProducer.username=lib_test
de.ruu.lib.jpa.se.hibernate.postgres.AbstractEntityManagerProducer.password=lib_test
de.ruu.lib.jpa.se.hibernate.postgres.AbstractEntityManagerProducer.puname=lib_test