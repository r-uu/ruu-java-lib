# ============================================================================
# MicroProfile Config for JPA Hibernate SE Tests
# ============================================================================
# Properties are injected by Maven resource filtering from config.properties
# Maven replaces ${db.xxx} with actual values during build
# Fallback values (after colon) are used if Maven filtering doesn't work
# See: config.properties (machine-specific, git-ignored)
# ============================================================================

config_ordinal=100

# PostgreSQL Database Connection - uses lib_test database for tests
# lib_test runs in dedicated Docker container on port 5434
database.host=${POSTGRES_LIB_TEST_HOST:localhost}
database.port=${POSTGRES_LIB_TEST_PORT:5434}
database.name=${POSTGRES_LIB_TEST_DATABASE:lib_test}
database.user=${POSTGRES_LIB_TEST_USER:lib_test}
database.password=${POSTGRES_LIB_TEST_PASSWORD:lib_test}

